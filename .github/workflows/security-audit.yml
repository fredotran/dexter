name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run security audit
        run: bun audit > audit-output.txt 2>&1 || true

      - name: Comment audit results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('audit-output.txt', 'utf8') || 'No audit output';
            const body = `## Security Audit Results

            \`\`\`
            ${output}
            \`\`\`
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Check for critical vulnerabilities
        id: check_critical
        run: |
          if grep -qi "critical" audit-output.txt; then
            echo "critical_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "critical_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue for critical vulnerabilities
        if: steps.check_critical.outputs.critical_found == 'true' && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('audit-output.txt', 'utf8') || 'No output available';
            const title = 'Critical security vulnerabilities detected';
            const body = `Critical vulnerabilities were detected during the scheduled security audit.

            Please review the latest \`security-audit\` workflow run and address any critical issues in direct dependencies.

            \`\`\`
            ${output}
            \`\`\`
            `;
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'automated']
            });
